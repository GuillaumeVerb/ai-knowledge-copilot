<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" fill="none">
  <rect width="1400" height="820" rx="36" fill="#F5F9FC"/>
  <rect x="60" y="56" width="1280" height="84" rx="24" fill="#0F172A"/>
  <text x="94" y="104" fill="#F8FAFC" font-size="34" font-family="Arial, sans-serif" font-weight="700">AI Knowledge Copilot Architecture</text>
  <text x="94" y="132" fill="#BFDBFE" font-size="18" font-family="Arial, sans-serif">Ingestion, retrieval, orchestration, confidence, and demo UI in one recruiter-friendly system.</text>

  <rect x="80" y="190" width="260" height="180" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="110" y="232" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">Inputs</text>
  <text x="110" y="274" fill="#334155" font-size="20" font-family="Arial, sans-serif">PDF, DOCX, TXT, MD, CSV</text>
  <text x="110" y="308" fill="#334155" font-size="20" font-family="Arial, sans-serif">Metadata: tags, category, date</text>
  <text x="110" y="342" fill="#334155" font-size="20" font-family="Arial, sans-serif">Versioning and reimport</text>

  <rect x="400" y="190" width="260" height="180" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="430" y="232" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">Ingestion</text>
  <text x="430" y="274" fill="#334155" font-size="20" font-family="Arial, sans-serif">Parse</text>
  <text x="430" y="308" fill="#334155" font-size="20" font-family="Arial, sans-serif">Clean</text>
  <text x="430" y="342" fill="#334155" font-size="20" font-family="Arial, sans-serif">Chunk and index</text>

  <rect x="720" y="190" width="260" height="180" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="750" y="232" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">Retrieval</text>
  <text x="750" y="274" fill="#334155" font-size="20" font-family="Arial, sans-serif">Qdrant or in-memory vectors</text>
  <text x="750" y="308" fill="#334155" font-size="20" font-family="Arial, sans-serif">Lexical fallback</text>
  <text x="750" y="342" fill="#334155" font-size="20" font-family="Arial, sans-serif">Optional reranking</text>

  <rect x="1040" y="190" width="280" height="180" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="1070" y="232" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">Orchestration</text>
  <text x="1070" y="274" fill="#334155" font-size="20" font-family="Arial, sans-serif">Query service narrows evidence</text>
  <text x="1070" y="308" fill="#334155" font-size="20" font-family="Arial, sans-serif">LLM answer generation</text>
  <text x="1070" y="342" fill="#334155" font-size="20" font-family="Arial, sans-serif">Confidence and caution</text>

  <rect x="160" y="470" width="320" height="200" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="194" y="512" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">Persistence</text>
  <text x="194" y="554" fill="#334155" font-size="20" font-family="Arial, sans-serif">SQLite documents and chunks</text>
  <text x="194" y="588" fill="#334155" font-size="20" font-family="Arial, sans-serif">History and feedback</text>
  <text x="194" y="622" fill="#334155" font-size="20" font-family="Arial, sans-serif">Version lineage metadata</text>

  <rect x="540" y="470" width="320" height="200" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="574" y="512" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">API Surface</text>
  <text x="574" y="554" fill="#334155" font-size="20" font-family="Arial, sans-serif">/query, /compare, /synthesize</text>
  <text x="574" y="588" fill="#334155" font-size="20" font-family="Arial, sans-serif">/documents, /summary, /history</text>
  <text x="574" y="622" fill="#334155" font-size="20" font-family="Arial, sans-serif">/health, /reindex, /demo/seed</text>

  <rect x="920" y="470" width="320" height="200" rx="26" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="954" y="512" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">React Demo UI</text>
  <text x="954" y="554" fill="#0F172A" font-size="20" font-family="Arial, sans-serif">Answer + evidence + confidence</text>
  <text x="954" y="588" fill="#0F172A" font-size="20" font-family="Arial, sans-serif">Compare, summarize, synthesize</text>
  <text x="954" y="622" fill="#0F172A" font-size="20" font-family="Arial, sans-serif">Library, history, versioning</text>

  <path d="M340 280H400" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M660 280H720" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M980 280H1040" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M1180 370V470" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M860 570H920" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M480 570H540" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
</svg>
