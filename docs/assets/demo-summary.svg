<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" rx="30" fill="#F8FBFD"/>
  <rect x="40" y="40" width="1120" height="640" rx="26" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="76" y="76" width="1048" height="112" rx="24" fill="#0F172A"/>
  <text x="110" y="128" fill="#FFFFFF" font-size="36" font-family="Arial, sans-serif" font-weight="700">Document summary workflow</text>
  <text x="110" y="164" fill="#BFDBFE" font-size="22" font-family="Arial, sans-serif">Overview, key points, and evidence stay tightly scoped to one document.</text>
  <rect x="90" y="230" width="300" height="380" rx="22" fill="#F1F7FC"/>
  <text x="118" y="274" fill="#0F172A" font-size="26" font-family="Arial, sans-serif" font-weight="700">Library action</text>
  <text x="118" y="320" fill="#334155" font-size="20" font-family="Arial, sans-serif">Select a document</text>
  <text x="118" y="354" fill="#334155" font-size="20" font-family="Arial, sans-serif">Click Summary</text>
  <text x="118" y="388" fill="#334155" font-size="20" font-family="Arial, sans-serif">Keep evidence narrow</text>
  <rect x="118" y="430" width="220" height="54" rx="16" fill="#E0F2FE"/>
  <text x="156" y="463" fill="#075985" font-size="20" font-family="Arial, sans-serif">Summary button</text>
  <rect x="430" y="230" width="650" height="380" rx="22" fill="#FFFFFF" stroke="#38BDF8"/>
  <text x="462" y="274" fill="#0F172A" font-size="26" font-family="Arial, sans-serif" font-weight="700">Summary output</text>
  <text x="462" y="320" fill="#0F172A" font-size="22" font-family="Arial, sans-serif">Overview: Remote work starts after onboarding and is manager-approved.</text>
  <text x="462" y="366" fill="#334155" font-size="18" font-family="Arial, sans-serif">Key points</text>
  <text x="462" y="398" fill="#334155" font-size="18" font-family="Arial, sans-serif">• Two remote days per week</text>
  <text x="462" y="428" fill="#334155" font-size="18" font-family="Arial, sans-serif">• Vacation requests two weeks in advance</text>
  <text x="462" y="458" fill="#334155" font-size="18" font-family="Arial, sans-serif">• New hire checklist includes equipment and security training</text>
  <rect x="462" y="500" width="560" height="74" rx="16" fill="#EFF6FF"/>
  <text x="484" y="532" fill="#1E3A8A" font-size="18" font-family="Arial, sans-serif">Evidence perimeter: 3 source excerpts across 1 document.</text>
  <text x="484" y="560" fill="#334155" font-size="16" font-family="Arial, sans-serif">Source cards remain visible below the summary.</text>
</svg>
