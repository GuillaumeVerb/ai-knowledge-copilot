<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" rx="30" fill="#F8FBFD"/>
  <rect x="40" y="40" width="1120" height="640" rx="26" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="82" y="82" width="1036" height="106" rx="24" fill="#0F172A"/>
  <text x="114" y="132" fill="#FFFFFF" font-size="36" font-family="Arial, sans-serif" font-weight="700">Versioning workflow</text>
  <text x="114" y="166" fill="#BFDBFE" font-size="22" font-family="Arial, sans-serif">Reimport a file, keep lineage, and show latest versus superseded state.</text>
  <rect x="100" y="234" width="280" height="340" rx="22" fill="#F1F7FC"/>
  <text x="128" y="282" fill="#0F172A" font-size="26" font-family="Arial, sans-serif" font-weight="700">Action</text>
  <text x="128" y="330" fill="#334155" font-size="20" font-family="Arial, sans-serif">Select base document</text>
  <text x="128" y="362" fill="#334155" font-size="20" font-family="Arial, sans-serif">Upload revised file</text>
  <text x="128" y="394" fill="#334155" font-size="20" font-family="Arial, sans-serif">Create new version</text>
  <rect x="128" y="440" width="210" height="54" rx="16" fill="#E2E8F0"/>
  <text x="164" y="473" fill="#0F172A" font-size="20" font-family="Arial, sans-serif">Create new version</text>
  <rect x="430" y="234" width="642" height="340" rx="22" fill="#FFFFFF" stroke="#38BDF8"/>
  <text x="462" y="282" fill="#0F172A" font-size="26" font-family="Arial, sans-serif" font-weight="700">Library state</text>
  <text x="462" y="332" fill="#166534" font-size="20" font-family="Arial, sans-serif">support.txt • v2 • latest</text>
  <text x="462" y="364" fill="#334155" font-size="18" font-family="Arial, sans-serif">Supersedes previous support.txt version and stays queryable as the latest record.</text>
  <text x="462" y="416" fill="#991B1B" font-size="20" font-family="Arial, sans-serif">support.txt • v1 • superseded</text>
  <text x="462" y="448" fill="#334155" font-size="18" font-family="Arial, sans-serif">Still traceable for history and comparisons when superseded versions are included.</text>
  <rect x="462" y="490" width="560" height="54" rx="16" fill="#EFF6FF"/>
  <text x="486" y="523" fill="#1E3A8A" font-size="18" font-family="Arial, sans-serif">Version group, next version number, and supersedes pointer stay visible in the backend model.</text>
</svg>
